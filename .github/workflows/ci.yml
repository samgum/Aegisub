name: Meson CI

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows MSVC Release
            os: windows-2022
            msvc: true
            buildtype: release
            args: >-
              -Ddefault_library=static
              --force-fallback-for=zlib,harfbuzz,freetype2,fribidi,libpng
              -Dfallback_nasm=true
              -Dfreetype2:harfbuzz=disabled
              -Dharfbuzz:freetype=disabled
              -Dharfbuzz:cairo=disabled
              -Dharfbuzz:glib=disabled
              -Dharfbuzz:gobject=disabled
              -Dharfbuzz:tests=disabled
              -Dharfbuzz:docs=disabled
              -Dfribidi:tests=false
              -Dfribidi:docs=false
              -Dlibass:fontconfig=disabled
          #- {
          #  name: Windows MinGW,
          #  os: windows-latest,
          #  msvc: false
          #}
          - {
            name: Ubuntu Debug,
            os: ubuntu-latest,
            buildtype: debugoptimized,
            args: -Db_pch=false
          }
          - {
            name: Ubuntu Release,
            os: ubuntu-latest,
            buildtype: release,
            args: -Db_pch=false
          }
          - {
            name: macOS x86_64 Debug,
            os: macos-15-intel,
            buildtype: debugoptimized,
            args: -Ddefault_library=static -Dbuild_osx_bundle=true -Dlocal_boost=true --force-fallback-for=ffms2
          }
          - {
            name: macOS x86_64 Release,
            os: macos-15-intel,
            buildtype: release,
            args: -Ddefault_library=static -Dbuild_osx_bundle=true -Dlocal_boost=true --force-fallback-for=ffms2
          }
          - {
            name: macOS arm64 Debug,
            os: macos-15,
            buildtype: debugoptimized,
            args: -Ddefault_library=static -Dbuild_osx_bundle=true -Dlocal_boost=true --force-fallback-for=ffms2
          }
          - {
            name: macOS arm64 Release,
            os: macos-15,
            buildtype: release,
            args: -Ddefault_library=static -Dbuild_osx_bundle=true -Dlocal_boost=true --force-fallback-for=ffms2
          }

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Setup Meson
        run: |
          python -m pip install --upgrade pip setuptools
          pip install meson

      - name: Setup MSVC
        if: startsWith(matrix.config.os, 'windows-') && matrix.config.msvc == true
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (-not $vsPath) {
            throw "Visual Studio with MSVC tools was not found"
          }

          $vsDevCmd = Join-Path $vsPath "Common7\Tools\VsDevCmd.bat"
          $lines = cmd /s /c "`"$vsDevCmd`" -arch=x64 -host_arch=x64 && set"

          $pathLine = $lines | Where-Object { $_ -match '^Path=' } | Select-Object -Last 1
          if ($pathLine) {
            $pathLine.Substring(5).Split(';') |
              Where-Object { $_ } |
              ForEach-Object { $_ | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append }
          }

          $exportNames = @(
            'DevEnvDir',
            'ExtensionSdkDir',
            'FrameworkDir',
            'FrameworkDir64',
            'FrameworkVersion',
            'FrameworkVersion64',
            'INCLUDE',
            'LIB',
            'LIBPATH',
            'UniversalCRTSdkDir',
            'UCRTVersion',
            'VCINSTALLDIR',
            'VCToolsInstallDir',
            'VCToolsRedistDir',
            'VCToolsVersion',
            'VisualStudioVersion',
            'VSINSTALLDIR',
            'WindowsLibPath',
            'WindowsSdkBinPath',
            'WindowsSdkDir',
            'WindowsSdkVerBinPath',
            'WindowsSDKLibVersion',
            'WindowsSDKVersion'
          )
          $exportPrefixes = @('VSCMD_')

          foreach ($line in $lines) {
            if ($line -notmatch '^([^=]+)=(.*)$') {
              continue
            }

            $name = $matches[1]
            $value = $matches[2]
            if ($exportNames -contains $name -or ($exportPrefixes | Where-Object { $name.StartsWith($_) })) {
              "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            }
          }

      - name: Install dependencies (Windows)
        if: startsWith(matrix.config.os, 'windows-')
        run: |
          choco install ninja innosetup

          $moonscripturl = "https://github.com/leafo/moonscript/releases/download/v0.6.0/moonscript-v0.6.0-windows-x86_64.zip"
          mkdir moonscript
          Invoke-WebRequest -Uri $moonscripturl -OutFile ".\moonscript\moonscript.zip"
          pushd moonscript
          7z e moonscript.zip
          Get-Location | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          popd

          $gettexturl = "https://github.com/mlocati/gettext-iconv-windows/releases/download/v1.0-v1.18-r3/gettext1.0-iconv1.18-static-64.zip"
          Invoke-WebRequest -Uri $gettexturl -OutFile ".\gettext.zip"
          Expand-Archive ".\gettext.zip" -DestinationPath gettext
          pushd gettext/bin
          Get-Location | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          popd

      - name: Install dependencies (MacOS)
        if: startsWith(matrix.config.os, 'macos-')
        run: |
          export HOMEBREW_NO_INSTALL_CLEANUP=1
          # Skip brew update for now, see https://github.com/actions/setup-python/issues/577
          # brew update
          missing_formulae=()
          for formula in ninja libass zlib ffms2 fftw hunspell pulseaudio; do
            if ! brew list --formula "$formula" >/dev/null 2>&1; then
              missing_formulae+=("$formula")
            fi
          done
          if [ ${#missing_formulae[@]} -gt 0 ]; then
            brew install "${missing_formulae[@]}"
          fi

      - name: Install dependencies (Linux)
        if: startsWith(matrix.config.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install ninja-build build-essential libx11-dev libfreetype6-dev pkg-config libfontconfig1-dev libass-dev libasound2-dev libffms2-dev intltool libboost-all-dev libhunspell-dev libcurl4-openssl-dev libuchardet-dev libgtest-dev libgmock-dev libwxgtk3.2-dev libportal-gtk3-dev

      - name: Configure
        run: meson setup build ${{ matrix.config.args }} -Dbuildtype=${{ matrix.config.buildtype }} ${{ github.ref_type == 'tag' && '-Dofficial_release=true' || '' }}

      - name: Build
        run: meson compile -C build

      - name: Run test
        run: meson test -C build --verbose "gtest main"

      # Windows artifacts
      - name: Generate Windows installer
        if: startsWith(matrix.config.os, 'windows-')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          meson compile win-installer -C build

      - name: Generate Windows portable installer
        if: startsWith(matrix.config.os, 'windows-')
        run: cd build && ninja win-portable

      - name: Upload artifacts - win_installer
        uses: actions/upload-artifact@v6
        if: startsWith(matrix.config.os, 'windows-')
        with:
          name: ${{ matrix.config.name }} - installer
          path: build/Aegisub-*.exe
          if-no-files-found: error

      - name: Upload artifacts - portable.zip
        uses: actions/upload-artifact@v6
        if: startsWith(matrix.config.os, 'windows-')
        with:
          name: ${{ matrix.config.name }} - portable
          path: build/aegisub-portable-64.zip

      # macOS artifacts
      - name: Generate macOS installer
        if: startsWith(matrix.config.os, 'macos-')
        run: |
          meson compile osx-bundle -C build
          meson compile osx-build-dmg -C build

      - name: Upload artifacts - macOS dmg
        uses: actions/upload-artifact@v6
        if: startsWith(matrix.config.os, 'macos-')
        with:
          name: ${{ matrix.config.name }} - installer
          path: build/Aegisub-*.dmg
          if-no-files-found: error

      # Tarball
      - name: Generate tarball
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.buildtype == 'release'
        run: |
          set -e

          meson dist --include-subprojects -C build

          # Make sure the subprojects we need are included
          mkdir distcheck
          tar -xJf build/meson-dist/*.tar.xz -C distcheck/
          test -e distcheck/*/subprojects/luabins/meson.build
          test -e distcheck/*/subprojects/LuaJIT*/meson.build

      - name: Upload artifacts - tarball
        uses: actions/upload-artifact@v6
        if: matrix.config.os == 'ubuntu-latest' && matrix.config.buildtype == 'release'
        with:
          name: Source Tarball
          path: build/meson-dist/*.tar.xz
          if-no-files-found: error
